services:
  main-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: main-server
    restart: unless-stopped
    ports:
      - "8085:8085"
    env_file:
      - .env
    environment:
      # Переопределение переменных для Docker-окружения
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5433/${DB_NAME:-maindb}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_MAIN_USER:-main-service}
      - MINIO_SECRET_KEY=${MINIO_MAIN_PASSWORD:-MainServicePass123!}
    volumes:
      - ./app.py:/app/app.py
      - ./config.py:/app/config.py
      - ./server:/app/server
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./requirements.txt:/app/requirements.txt
      - ./settings.json:/app/settings.json
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL для основного сервера
  db:
    image: postgres:15-alpine
    container_name: main-server-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
      POSTGRES_DB: ${DB_NAME:-db_dsa}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5433"
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-db_dsa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio-standalone
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: miniouser
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-standalone-data:/data
    networks:
      - ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres-data:
  minio-standalone-data:

networks:
  ai-net:
    driver: bridge