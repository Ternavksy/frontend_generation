services:
  # MinIO с инициализацией
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-storage:/data
      - minio-config:/root/.minio
    environment:
      MINIO_ROOT_USER: miniouser
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-miniouser}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
      MINIO_MAIN_USER: ${MINIO_MAIN_USER:-main-service}
      MINIO_MAIN_PASSWORD: ${MINIO_MAIN_PASSWORD:-MainServicePass123!}
      MINIO_APP_SAM_USER: ${MINIO_APP_SAM_USER:-detection-user-sam}
      MINIO_APP_SAM_PASSWORD: ${MINIO_APP_SAM_PASSWORD:-DetectionPass123!}
      MINIO_APP_YOLO_USER: ${MINIO_APP_YOLO_USER:-detection-user-yolo}
      MINIO_APP_YOLO_PASSWORD: ${MINIO_APP_YOLO_PASSWORD:-DetectionYoloPass123!}
    volumes:
      - ./minio/configs/minio-policy-sam.json:/config/minio-policy-sam.json:ro
      - ./minio/configs/minio-policy-yolo.json:/config/minio-policy-yolo.json:ro
      - ./minio/configs/minio-policy-main.json:/config/minio-policy-main.json:ro
      - ./minio/configs/cors-config-minio.json:/config/cors-config-minio.json:ro
      - ./minio/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - ai-net

  sam2:
    profiles:
      - models
    build:
      context: ./SAM2
      dockerfile: Dockerfile
    container_name: detection-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=miniouser
      - MINIO_SECRET_KEY=admin123
      - DEVICE=${SAM2_DEVICE:-cpu}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - ai-net

  # MainServer
  main-server:
    build:
      context: ./MainServer
      dockerfile: Dockerfile
    container_name: main-server
    restart: unless-stopped
    ports:
      - "8085:8085"
    env_file:
      - ./MainServer/.env
    environment:
      # Подключение к БД и MinIO внутри Docker-сети
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-1234}@db:5432/${DB_NAME:-db_dsa}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_MAIN_USER:-main-service}
      - MINIO_SECRET_KEY=${MINIO_MAIN_PASSWORD:-MainServicePass123!}
      - ALEMBIC_CONFIG=alembic.ini
      # Явное указание рабочей директории (дублирующая страховка)
      - PYTHONPATH=/app
    volumes:
      # Монтируем исходный код: ./MainServer -> /app внутри контейнера
      - ./MainServer:/app
      # Исключаем __pycache__ и .git из монтирования (опционально, для чистоты)
      - /app/__pycache__
      - /app/.git
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Явное указание рабочей директории и команды (если нужно переопределить Dockerfile)
    working_dir: /app
    command: ["python", "app.py"]

  # PostgreSQL для MainServer
  db:
    image: postgres:15-alpine
    container_name: dsa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
      POSTGRES_DB: ${DB_NAME:-db_dsa}
    volumes:
      - postgres-main-data:/var/lib/postgresql/data
    ports:  # только для локальной отладки
      - "5433:5432"
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-db_dsa}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio-storage:
  minio-config:
  postgres-main-data:

networks:
  ai-net:
    driver: bridge


# Сборка и запуск всех сервисов
# docker-compose up --build -d

# Применение миграций Alembic (после запуска)
# docker-compose exec main-server alembic upgrade head

# Остановка
# docker-compose down

# Остановка с удалением томов (осторожно!)
# docker-compose down -v

# Заново запустить, если нужно:
# docker-compose up -d

# пересобрать:
# docker-compose up --build -d --force-recreate main-server

# Остановить контейнер
# docker-compose stop
# Запустить контейнер
# docker-compose start
